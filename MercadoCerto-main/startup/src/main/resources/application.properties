# ===== Banco de dados =====
# Em producao (Railway), defina as variaveis de ambiente abaixo.
# Localmente, sem variaveis, ele cai no default de localhost.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/MercadoCerto}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# Pool de conexoes enxuto (instancia pequena do Railway)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
# Dialeto fixo: evita o erro "Unable to determine Dialect" quando a conexao falha,
# fazendo o app mostrar o erro real de conexao em vez da mensagem de dialeto.
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# ===== Servidor =====
# O Railway injeta a porta na variavel PORT. Local cai em 8080.
server.port=${PORT:8080}

# ===== Uploads de imagens =====
uploads.path=${UPLOADS_PATH:uploads}

# ===== JSON / datas =====
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.date-format=yyyy-MM-dd
